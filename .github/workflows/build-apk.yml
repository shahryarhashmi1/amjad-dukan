name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build
        run: |
          npm install
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync android

      - name: Fix gradle wrapper
        run: |
          cd android
          chmod +x gradlew
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Update gradle wrapper
        run: |
          cd android
          sed -i 's|gradle-.*-all.zip|gradle-8.0-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          sed -i 's|gradle-.*-bin.zip|gradle-8.0-bin.zip|g' gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: amjad-dukan-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk